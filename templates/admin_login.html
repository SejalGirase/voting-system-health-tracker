<!DOCTYPE html>
<html>
<head>
    <title>Admin Authentication</title>
    <style>
        body { font-family: 'Consolas', monospace; background-color: #1a1a1a; color: #fff; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .container { background: #2d2d2d; padding: 40px; width: 350px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-top: 4px solid #e74c3c; text-align: center; }
        h2 { color: #e74c3c; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        input { margin: 15px 0; padding: 15px; width: 85%; border: 1px solid #444; border-radius: 4px; background: #111; color: #0f0; font-size: 16px; outline: none; }
        input:focus { border-color: #e74c3c; }
        button { padding: 15px; width: 95%; background: #e74c3c; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        button:hover { background: #c0392b; }
        .error { color: #ff6b6b; margin-bottom: 15px; font-weight: bold; animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>System Override</h2>
        {% if error %}<div class="error">>> {{ error }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter Admin Passkey" required autofocus>
            <button type="submit">Authenticate</button>
        </form>
    </div>
</body>
</html>
