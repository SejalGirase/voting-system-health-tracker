<!DOCTYPE html>
<html>
<head>
    <title>Secure Voter Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 40px; width: 350px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); text-align: center; position: relative;}
        h2 { color: #333; margin-bottom: 30px; font-size: 28px; }
        input { margin: 10px 0; padding: 15px; width: 90%; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #667eea; box-shadow: 0 0 8px rgba(102, 126, 234, 0.4); }
        button { padding: 15px; width: 100%; background: #667eea; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #5a6cd6; transform: translateY(-2px); }
        p { margin-top: 20px; color: #666; }
        a { color: #764ba2; text-decoration: none; font-weight: bold; }
        .error { color: #ff4757; font-weight: bold; margin-bottom: 15px; }
        .admin-link { display: block; margin-top: 30px; font-size: 12px; color: #aaa; text-decoration: none; }
        .admin-link:hover { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👋 Welcome Back</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Voter ID / Username" required>
            <input type="password" name="password" placeholder="Secure Password" required>
            <button type="submit">Login to Vote</button>
        </form>
        <p>Not registered yet? <a href="/register">Create an account</a></p>
        
        <a href="/health" class="admin-link" target="_blank">⚙️ Admin: System Health Tracker</a>
    </div>
</body>
</html>
